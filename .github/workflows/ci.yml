name: Quality Gates

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends espeak-ng ffmpeg fonts-dejavu-core
      - name: Verify media toolchain
        run: |
          ffmpeg -version | head -1
          espeak-ng --version | head -1
      - name: Test platform
        uses: ./.github/actions/test-platform
      - name: Verify workflow supply-chain policy
        run: python3 tools/validate_workflows.py
      - name: Verify generated schemas are current
        run: |
          schema_tmp="$(mktemp -d)"
          PYTHONPATH=src python3 -m insynergy_cinematic --compact export-schemas "$schema_tmp"
          diff -ru schemas "$schema_tmp"
