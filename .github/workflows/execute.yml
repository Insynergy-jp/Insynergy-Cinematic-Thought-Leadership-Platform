name: Execute Approved Plan

on:
  workflow_dispatch:
    inputs:
      planning_run_id:
        description: Run ID of the Plan Article workflow
        required: true
        type: string
      build_id:
        description: Build ID shown by the planning workflow
        required: true
        type: string
      runway_recovery_run_id:
        description: Optional trusted Execute run ID whose safe Runway task state should be reused
        required: false
        default: ""
        type: string
      runway_fidelity_recovery:
        description: Expand the approved Full Auto hybrid render to the five v11 live-action recovery shots
        required: true
        default: false
        type: boolean
      audio_only_recovery:
        description: Reuse a validated Full Auto picture when only approved dialogue and captions changed
        required: true
        default: false
        type: boolean
      full_auto_shout_recovery:
        description: Regenerate only the approved English dialogue with an explosive Shot 07 vocal performance
        required: true
        default: false
        type: boolean
      config_path:
        description: Optional repository-relative production configuration used during planning
        required: false
        default: ""
        type: string
      profile:
        description: Must match the planning profile
        required: true
        default: preview
        type: choice
        options: [draft, preview, final]
      provider:
        description: Must match the planning provider
        required: true
        default: local
        type: choice
        options: [local, runway]
      runway_scope:
        description: Must match the planning Runway coverage
        required: true
        default: hybrid
        type: choice
        options: [hybrid, all_shots]
      narration_provider:
        description: Must match the planning narration provider
        required: true
        default: offline
        type: choice
        options: [none, offline, openai]
      pre_render_preview_mode:
        description: Must match the planning preview mode
        required: true
        default: "off"
        type: choice
        options: ["off", storyboard_animatic]
      allow_agent_exception:
        description: Permit a human exception for a non-PASS Agent Review
        required: true
        default: false
        type: boolean
      agent_exception_reason:
        description: Required rationale when an Agent Review exception is permitted
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: execute-${{ inputs.build_id }}
  cancel-in-progress: false

jobs:
  execute:
    environment: render-approval
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout recovery workflow source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve approved planning source
        id: planning_source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_RUN_ID: ${{ inputs.planning_run_id }}
          SOURCE_WORKFLOW: ${{ inputs.pre_render_preview_mode == 'storyboard_animatic' && 'Storyboard Preview' || 'Plan Article' }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/github_planning_source.py --repository "$REPOSITORY" --run-id "$SOURCE_RUN_ID" --workflow "$SOURCE_WORKFLOW" --github-output "$GITHUB_OUTPUT" > planning-source-result.json
      - name: Validate workflow inputs
        env:
          SOURCE_RUN_ID: ${{ inputs.planning_run_id }}
          RUNWAY_RECOVERY_RUN_ID: ${{ inputs.runway_recovery_run_id }}
          BUILD_ID: ${{ inputs.build_id }}
          ALLOW_AGENT_EXCEPTION: ${{ inputs.allow_agent_exception }}
          AGENT_EXCEPTION_REASON: ${{ inputs.agent_exception_reason }}
          CONFIG_PATH: ${{ inputs.config_path }}
          RENDER_PROVIDER: ${{ inputs.provider }}
          RUNWAY_SCOPE: ${{ inputs.runway_scope }}
          RUNWAY_FIDELITY_RECOVERY: ${{ inputs.runway_fidelity_recovery }}
          AUDIO_ONLY_RECOVERY: ${{ inputs.audio_only_recovery }}
          FULL_AUTO_SHOUT_RECOVERY: ${{ inputs.full_auto_shout_recovery }}
          PLANNING_RUN_ID: ${{ inputs.planning_run_id }}
        run: |
          set -euo pipefail
          case "$SOURCE_RUN_ID" in *[!0-9]*|'') echo "planning_run_id must be numeric" >&2; exit 2 ;; esac
          if test -n "$RUNWAY_RECOVERY_RUN_ID"; then
            case "$RUNWAY_RECOVERY_RUN_ID" in *[!0-9]*) echo "runway_recovery_run_id must be numeric" >&2; exit 2 ;; esac
            test "$RENDER_PROVIDER" = "runway" || { echo "runway_recovery_run_id requires provider=runway" >&2; exit 2; }
          fi
          case "$BUILD_ID" in [0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]-[0-9][0-9][0-9]) ;; *) echo "invalid build_id" >&2; exit 2 ;; esac
          if [ "$ALLOW_AGENT_EXCEPTION" = "true" ]; then
            test -n "$AGENT_EXCEPTION_REASON" || { echo "agent_exception_reason is required" >&2; exit 2; }
          fi
          if test -n "$CONFIG_PATH"; then
            case "$CONFIG_PATH" in /*|*..*) echo "config_path must be repository-relative and contain no .." >&2; exit 2 ;; esac
            test -f "$CONFIG_PATH"
          fi
          if [ "$RUNWAY_FIDELITY_RECOVERY" = "true" ]; then
            test "$RENDER_PROVIDER" = "runway" || { echo "fidelity recovery requires provider=runway" >&2; exit 2; }
            test "$RUNWAY_SCOPE" = "hybrid" || { echo "fidelity recovery preserves the approved hybrid scope" >&2; exit 2; }
            test -n "$RUNWAY_RECOVERY_RUN_ID" || { echo "fidelity recovery requires a trusted Runway recovery run" >&2; exit 2; }
            test "$CONFIG_PATH" = "creative/full-auto-30s/production-config.json" || { echo "fidelity recovery is bound to the Full Auto production config" >&2; exit 2; }
            test "$BUILD_ID" = "20260723-001" || { echo "fidelity recovery is bound to the approved Full Auto build" >&2; exit 2; }
            if [ "$AUDIO_ONLY_RECOVERY" = "true" ]; then
              test "$PLANNING_RUN_ID" = "29982665848" || { echo "audio-only recovery is bound to the approved English Full Auto planning run" >&2; exit 2; }
              test "$RUNWAY_RECOVERY_RUN_ID" = "29981824842" || { echo "audio-only recovery is bound to the validated Full Auto picture" >&2; exit 2; }
            else
              test "$PLANNING_RUN_ID" = "29975671551" || { echo "fidelity recovery is bound to the approved Full Auto planning run" >&2; exit 2; }
            fi
          elif [ "$AUDIO_ONLY_RECOVERY" = "true" ]; then
            echo "audio_only_recovery requires runway_fidelity_recovery" >&2
            exit 2
          fi
          if [ "$FULL_AUTO_SHOUT_RECOVERY" = "true" ]; then
            test "$AUDIO_ONLY_RECOVERY" = "true" || { echo "full_auto_shout_recovery requires audio_only_recovery" >&2; exit 2; }
            test "$PLANNING_RUN_ID" = "29982665848" || { echo "full_auto_shout_recovery is bound to the approved English Full Auto planning run" >&2; exit 2; }
            test "$RUNWAY_RECOVERY_RUN_ID" = "29981824842" || { echo "full_auto_shout_recovery is bound to the validated Full Auto picture" >&2; exit 2; }
            test "$CONFIG_PATH" = "creative/full-auto-30s/production-config.json" || { echo "full_auto_shout_recovery is bound to the Full Auto production config" >&2; exit 2; }
            test "$BUILD_ID" = "20260723-001" || { echo "full_auto_shout_recovery is bound to the approved Full Auto build" >&2; exit 2; }
          fi
      - name: Verify planning and execution runtime compatibility
        env:
          PLANNING_SOURCE_SHA: ${{ steps.planning_source.outputs.source_sha }}
          EXECUTION_SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/verify_runtime_compatibility.py --root "$GITHUB_WORKSPACE" --planning-source-sha "$PLANNING_SOURCE_SHA" --execution-source-sha "$EXECUTION_SOURCE_SHA" > runtime-compatibility-result.json
      - name: Inspect trusted Execute run for Runway recovery
        if: ${{ inputs.runway_recovery_run_id != '' }}
        id: runway_recovery
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RECOVERY_RUN_ID: ${{ inputs.runway_recovery_run_id }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/recover_runway_execution.py inspect --repository "$REPOSITORY" --run-id "$RECOVERY_RUN_ID" --github-output "$GITHUB_OUTPUT" > runway-recovery-inspection.json
      - name: Download planning bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: planning-${{ inputs.planning_run_id }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.planning_run_id }}
      - name: Verify build identity
        env:
          EXPECTED_BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -euo pipefail
          test "$(tr -d '\n' < build-id.txt)" = "$EXPECTED_BUILD_ID"
      - name: Inspect planning handoff for bounded recovery
        id: planning_recovery
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/recover_planning_evidence.py --root "$GITHUB_WORKSPACE" --evidence workflow-evidence.json --github-output "$GITHUB_OUTPUT" inspect > planning-recovery-inspection.json
      - name: Download sealed planning base for recovery
        if: ${{ steps.planning_recovery.outputs.recovery_required == 'true' }}
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: planning-base-${{ inputs.planning_run_id }}
          path: planning-recovery
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.planning_run_id }}
      - name: Restore exact hash-bound Persona approval evidence
        if: ${{ steps.planning_recovery.outputs.recovery_required == 'true' }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/recover_planning_evidence.py --root "$GITHUB_WORKSPACE" --evidence workflow-evidence.json recover --source-root planning-recovery > planning-recovery-result.json
      - name: Download prior safe Runway diagnostics
        if: ${{ inputs.runway_recovery_run_id != '' }}
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: ${{ steps.runway_recovery.outputs.artifact_name }}
          path: execution-recovery
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.runway_recovery_run_id }}
      - name: Restore safe Runway idempotency state
        if: ${{ inputs.runway_recovery_run_id != '' }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/recover_runway_execution.py recover --source execution-recovery/.insynergy/providers/runway/jobs.json --target .insynergy/providers/runway/jobs.json > runway-recovery-result.json
      - name: Restore validated picture for approved audio-only revision
        if: ${{ inputs.audio_only_recovery }}
        env:
          BUILD_ID: ${{ inputs.build_id }}
          BUILD_PROFILE: ${{ inputs.profile }}
          RENDER_PROVIDER: ${{ inputs.provider }}
          RUNWAY_SCOPE: ${{ inputs.runway_scope }}
          CONFIG_PATH: ${{ inputs.config_path }}
          INSYNERGY_RUNWAY_RECOVERY_SHOTS: scene-001-shot-01,scene-002-shot-01,scene-004-shot-01,scene-005-shot-01,scene-007-shot-01
          INSYNERGY_RUNWAY_RECOVERY_REASON: User-approved audio-only Full Auto revision; visual prompts and overlays must remain byte-for-byte equivalent.
          INSYNERGY_RUNWAY_STORYBOARD_REFERENCES: full-auto-v11
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/recover_audio_only_cache.py --source-root execution-recovery --target-root "$GITHUB_WORKSPACE" --build-id "$BUILD_ID" --config "$CONFIG_PATH" --profile "$BUILD_PROFILE" --provider "$RENDER_PROVIDER" --runway-scope "$RUNWAY_SCOPE" --output audio-only-recovery-result.json
      - name: Record skipped audio-only recovery
        if: ${{ inputs.audio_only_recovery == false }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json

          value = {"passed": True, "recovery_required": False, "recovered_shot_count": 0}
          with open("audio-only-recovery-result.json", "w", encoding="utf-8") as output:
              json.dump(value, output, sort_keys=True, separators=(",", ":"))
              output.write("\n")
          PY
      - name: Record skipped Runway task recovery
        if: ${{ inputs.runway_recovery_run_id == '' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json

          value = {"passed": True, "recovery_required": False, "recovered_jobs": 0}
          for path in ("runway-recovery-inspection.json", "runway-recovery-result.json"):
              with open(path, "w", encoding="utf-8") as output:
                  json.dump(value, output, sort_keys=True, separators=(",", ":"))
                  output.write("\n")
          PY
      - name: Verify execution source inputs
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          test -z "$CONFIG_PATH" || test -f "$CONFIG_PATH"
      - name: Install FFmpeg
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends espeak-ng ffmpeg fonts-dejavu-core
      - name: Verify media toolchain
        run: |
          set -euo pipefail
          ffmpeg -version
          espeak-ng --version
      - name: Verify immutable planning handoff
        uses: ./.github/actions/workflow-evidence
        with:
          operation: verify
          stage: planning
          build-id: ${{ inputs.build_id }}
          profile: ${{ inputs.profile }}
          source-workflow: ${{ inputs.pre_render_preview_mode == 'storyboard_animatic' && 'Storyboard Preview' || 'Plan Article' }}
          source-repository: ${{ github.repository }}
          source-run-id: ${{ inputs.planning_run_id }}
          source-sha: ${{ steps.planning_source.outputs.source_sha }}
      - name: Validate provider configuration
        env:
          RENDER_PROVIDER: ${{ inputs.provider }}
          RUNWAY_SCOPE: ${{ inputs.runway_scope }}
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          RUNWAY_BASE_URL: ${{ vars.RUNWAY_BASE_URL }}
          RUNWAY_MODEL_GEN45: ${{ vars.RUNWAY_MODEL_GEN45 }}
          NARRATION_PROVIDER: ${{ inputs.narration_provider }}
          OPENAI_TTS_API_KEY: ${{ secrets.OPENAI_TTS_API_KEY }}
        run: |
          set -euo pipefail
          if [ "$RENDER_PROVIDER" = "runway" ]; then
            test -n "$RUNWAY_API_KEY" || { echo "RUNWAY_API_KEY environment secret is required" >&2; exit 3; }
            test -n "$RUNWAY_BASE_URL" || { echo "RUNWAY_BASE_URL environment variable is required" >&2; exit 2; }
            test -n "$RUNWAY_MODEL_GEN45" || { echo "RUNWAY_MODEL_GEN45 environment variable is required" >&2; exit 2; }
            test "$RUNWAY_BASE_URL" = "https://api.dev.runwayml.com" || { echo "RUNWAY_BASE_URL must use the official Runway API origin" >&2; exit 2; }
            test "$RUNWAY_MODEL_GEN45" = "gen4.5" || { echo "RUNWAY_MODEL_GEN45 must be gen4.5" >&2; exit 2; }
          fi
          if [ "$RUNWAY_SCOPE" = "all_shots" ]; then
            test "$RENDER_PROVIDER" = "runway" || { echo "all_shots requires provider=runway" >&2; exit 2; }
          fi
          if [ "$NARRATION_PROVIDER" = "openai" ]; then
            test -n "$OPENAI_TTS_API_KEY" || { echo "OPENAI_TTS_API_KEY environment secret is required" >&2; exit 3; }
          fi
      - name: Record environment approval and execute
        env:
          BUILD_ID: ${{ inputs.build_id }}
          BUILD_PROFILE: ${{ inputs.profile }}
          RENDER_PROVIDER: ${{ inputs.provider }}
          RUNWAY_SCOPE: ${{ inputs.runway_scope }}
          APPROVER: ${{ github.actor }}
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          RUNWAY_BASE_URL: ${{ vars.RUNWAY_BASE_URL }}
          RUNWAY_MODEL_GEN45: ${{ vars.RUNWAY_MODEL_GEN45 }}
          NARRATION_PROVIDER: ${{ inputs.narration_provider }}
          OPENAI_TTS_API_KEY: ${{ secrets.OPENAI_TTS_API_KEY }}
          ALLOW_AGENT_EXCEPTION: ${{ inputs.allow_agent_exception }}
          AGENT_EXCEPTION_REASON: ${{ inputs.agent_exception_reason }}
          PRE_RENDER_PREVIEW_MODE: ${{ inputs.pre_render_preview_mode }}
          CONFIG_PATH: ${{ inputs.config_path }}
          INSYNERGY_RUNWAY_RECOVERY_SHOTS: ${{ inputs.runway_fidelity_recovery && 'scene-001-shot-01,scene-002-shot-01,scene-004-shot-01,scene-005-shot-01,scene-007-shot-01' || '' }}
          INSYNERGY_RUNWAY_RECOVERY_REASON: ${{ inputs.runway_fidelity_recovery && 'User-authorized Full Auto fidelity recovery - replace placeholder live-action shots, bind the approved v11 identity references, and preserve deterministic UI post-production.' || '' }}
          INSYNERGY_RUNWAY_STORYBOARD_REFERENCES: ${{ inputs.runway_fidelity_recovery && 'full-auto-v11' || '' }}
          INSYNERGY_TTS_PERFORMANCE_RECOVERY: ${{ inputs.full_auto_shout_recovery && 'full-auto-shot7-shout-v1' || '' }}
        run: |
          set -euo pipefail
          CONFIG_ARGUMENTS=()
          test -z "$CONFIG_PATH" || CONFIG_ARGUMENTS=(--config "$CONFIG_PATH")
          if [ "$ALLOW_AGENT_EXCEPTION" = "true" ]; then
            PYTHONPATH=src python3 -m insynergy_cinematic "${CONFIG_ARGUMENTS[@]}" --profile "$BUILD_PROFILE" --provider "$RENDER_PROVIDER" --runway-scope "$RUNWAY_SCOPE" --narration-provider "$NARRATION_PROVIDER" --pre-render-preview-mode "$PRE_RENDER_PREVIEW_MODE" approve "$BUILD_ID" --gate execution --actor "$APPROVER" --allow-agent-exception --agent-exception-reason "$AGENT_EXCEPTION_REASON"
          else
            PYTHONPATH=src python3 -m insynergy_cinematic "${CONFIG_ARGUMENTS[@]}" --profile "$BUILD_PROFILE" --provider "$RENDER_PROVIDER" --runway-scope "$RUNWAY_SCOPE" --narration-provider "$NARRATION_PROVIDER" --pre-render-preview-mode "$PRE_RENDER_PREVIEW_MODE" approve "$BUILD_ID" --gate execution --actor "$APPROVER"
          fi
          PYTHONPATH=src python3 -m insynergy_cinematic "${CONFIG_ARGUMENTS[@]}" --profile "$BUILD_PROFILE" --provider "$RENDER_PROVIDER" --runway-scope "$RUNWAY_SCOPE" --narration-provider "$NARRATION_PROVIDER" --pre-render-preview-mode "$PRE_RENDER_PREVIEW_MODE" execute "$BUILD_ID" > execution-result.json
          python3 -c 'import json; value=json.load(open("execution-result.json")); assert value["state"] == "READY"'
      - name: Verify runtime and quality evidence
        env:
          BUILD_ID: ${{ inputs.build_id }}
          BUILD_PROFILE: ${{ inputs.profile }}
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          CONFIG_ARGUMENTS=()
          test -z "$CONFIG_PATH" || CONFIG_ARGUMENTS=(--config "$CONFIG_PATH")
          PYTHONPATH=src python3 -m insynergy_cinematic "${CONFIG_ARGUMENTS[@]}" --profile "$BUILD_PROFILE" verify "$BUILD_ID" > verification-result.json
          python3 -c 'import json; value=json.load(open("verification-result.json")); assert value["passed"] is True; assert value["quality_integrity"] is True'
      - name: Seal validated execution handoff
        uses: ./.github/actions/workflow-evidence
        with:
          operation: create
          stage: execution
          build-id: ${{ inputs.build_id }}
          profile: ${{ inputs.profile }}
          source-workflow: ${{ github.workflow }}
          source-repository: ${{ github.repository }}
          source-run-id: ${{ github.run_id }}
          source-run-attempt: ${{ github.run_attempt }}
          source-sha: ${{ github.sha }}
          paths: |
            .insynergy
            execution-result.json
            verification-result.json
            runtime-compatibility-result.json
            runway-recovery-inspection.json
            runway-recovery-result.json
            audio-only-recovery-result.json
            build-id.txt
      - name: Write safe execution summary
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/workflow_evidence.py summary --evidence workflow-evidence.json --result execution-result.json
      - name: Upload safe execution diagnostics
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: execution-diagnostics-${{ github.run_id }}
          path: |
            execution-result.json
            verification-result.json
            runtime-compatibility-result.json
            planning-source-result.json
            planning-recovery-inspection.json
            planning-recovery-result.json
            runway-recovery-inspection.json
            runway-recovery-result.json
            audio-only-recovery-result.json
            workflow-evidence-result.json
            .insynergy/builds/${{ inputs.build_id }}/manifest.json
            .insynergy/builds/${{ inputs.build_id }}/artifacts/render_manifest.json
            .insynergy/builds/${{ inputs.build_id }}/artifacts/render_results.json
            .insynergy/providers/runway/jobs.json
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7
      - name: Upload validated build
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: validated-${{ github.run_id }}
          path: |
            .insynergy
            execution-result.json
            verification-result.json
            runtime-compatibility-result.json
            runway-recovery-inspection.json
            runway-recovery-result.json
            build-id.txt
            workflow-evidence.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
