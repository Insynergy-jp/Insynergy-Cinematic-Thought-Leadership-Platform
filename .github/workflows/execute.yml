name: Execute Approved Plan

on:
  workflow_dispatch:
    inputs:
      planning_run_id:
        description: Run ID of the Plan Article workflow
        required: true
        type: string
      build_id:
        description: Build ID shown by the planning workflow
        required: true
        type: string
      config_path:
        description: Optional repository-relative production configuration used during planning
        required: false
        default: ""
        type: string
      profile:
        description: Must match the planning profile
        required: true
        default: preview
        type: choice
        options: [draft, preview, final]
      provider:
        description: Must match the planning provider
        required: true
        default: local
        type: choice
        options: [local, runway]
      runway_scope:
        description: Must match the planning Runway coverage
        required: true
        default: hybrid
        type: choice
        options: [hybrid, all_shots]
      narration_provider:
        description: Must match the planning narration provider
        required: true
        default: offline
        type: choice
        options: [offline, openai]
      pre_render_preview_mode:
        description: Must match the planning preview mode
        required: true
        default: "off"
        type: choice
        options: ["off", storyboard_animatic]
      allow_agent_exception:
        description: Permit a human exception for a non-PASS Agent Review
        required: true
        default: false
        type: boolean
      agent_exception_reason:
        description: Required rationale when an Agent Review exception is permitted
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: execute-${{ inputs.build_id }}
  cancel-in-progress: false

jobs:
  execute:
    environment: render-approval
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout recovery workflow source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve approved planning source
        id: planning_source
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_RUN_ID: ${{ inputs.planning_run_id }}
          SOURCE_WORKFLOW: ${{ inputs.pre_render_preview_mode == 'storyboard_animatic' && 'Storyboard Preview' || 'Plan Article' }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/github_planning_source.py --repository "$REPOSITORY" --run-id "$SOURCE_RUN_ID" --workflow "$SOURCE_WORKFLOW" --github-output "$GITHUB_OUTPUT" > planning-source-result.json
      - name: Validate workflow inputs
        env:
          SOURCE_RUN_ID: ${{ inputs.planning_run_id }}
          BUILD_ID: ${{ inputs.build_id }}
          ALLOW_AGENT_EXCEPTION: ${{ inputs.allow_agent_exception }}
          AGENT_EXCEPTION_REASON: ${{ inputs.agent_exception_reason }}
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          case "$SOURCE_RUN_ID" in *[!0-9]*|'') echo "planning_run_id must be numeric" >&2; exit 2 ;; esac
          case "$BUILD_ID" in [0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]-[0-9][0-9][0-9]) ;; *) echo "invalid build_id" >&2; exit 2 ;; esac
          if [ "$ALLOW_AGENT_EXCEPTION" = "true" ]; then
            test -n "$AGENT_EXCEPTION_REASON" || { echo "agent_exception_reason is required" >&2; exit 2; }
          fi
          if test -n "$CONFIG_PATH"; then
            case "$CONFIG_PATH" in /*|*..*) echo "config_path must be repository-relative and contain no .." >&2; exit 2 ;; esac
            test -f "$CONFIG_PATH"
          fi
      - name: Verify planning and execution runtime compatibility
        env:
          PLANNING_SOURCE_SHA: ${{ steps.planning_source.outputs.source_sha }}
          EXECUTION_SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/verify_runtime_compatibility.py --root "$GITHUB_WORKSPACE" --planning-source-sha "$PLANNING_SOURCE_SHA" --execution-source-sha "$EXECUTION_SOURCE_SHA" > runtime-compatibility-result.json
      - name: Download planning bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: planning-${{ inputs.planning_run_id }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.planning_run_id }}
      - name: Verify build identity
        env:
          EXPECTED_BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -euo pipefail
          test "$(tr -d '\n' < build-id.txt)" = "$EXPECTED_BUILD_ID"
      - name: Inspect planning handoff for bounded recovery
        id: planning_recovery
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/recover_planning_evidence.py --root "$GITHUB_WORKSPACE" --evidence workflow-evidence.json --github-output "$GITHUB_OUTPUT" inspect > planning-recovery-inspection.json
      - name: Download sealed planning base for recovery
        if: ${{ steps.planning_recovery.outputs.recovery_required == 'true' }}
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: planning-base-${{ inputs.planning_run_id }}
          path: planning-recovery
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.planning_run_id }}
      - name: Restore exact hash-bound Persona approval evidence
        if: ${{ steps.planning_recovery.outputs.recovery_required == 'true' }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/recover_planning_evidence.py --root "$GITHUB_WORKSPACE" --evidence workflow-evidence.json recover --source-root planning-recovery > planning-recovery-result.json
      - name: Verify execution source inputs
        env:
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          test -z "$CONFIG_PATH" || test -f "$CONFIG_PATH"
      - name: Install FFmpeg
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends espeak-ng ffmpeg fonts-dejavu-core
      - name: Verify media toolchain
        run: |
          set -euo pipefail
          ffmpeg -version
          espeak-ng --version
      - name: Verify immutable planning handoff
        uses: ./.github/actions/workflow-evidence
        with:
          operation: verify
          stage: planning
          build-id: ${{ inputs.build_id }}
          profile: ${{ inputs.profile }}
          source-workflow: ${{ inputs.pre_render_preview_mode == 'storyboard_animatic' && 'Storyboard Preview' || 'Plan Article' }}
          source-repository: ${{ github.repository }}
          source-run-id: ${{ inputs.planning_run_id }}
          source-sha: ${{ steps.planning_source.outputs.source_sha }}
      - name: Validate provider configuration
        env:
          RENDER_PROVIDER: ${{ inputs.provider }}
          RUNWAY_SCOPE: ${{ inputs.runway_scope }}
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          RUNWAY_BASE_URL: ${{ vars.RUNWAY_BASE_URL }}
          RUNWAY_MODEL_GEN45: ${{ vars.RUNWAY_MODEL_GEN45 }}
          NARRATION_PROVIDER: ${{ inputs.narration_provider }}
          OPENAI_TTS_API_KEY: ${{ secrets.OPENAI_TTS_API_KEY }}
        run: |
          set -euo pipefail
          if [ "$RENDER_PROVIDER" = "runway" ]; then
            test -n "$RUNWAY_API_KEY" || { echo "RUNWAY_API_KEY environment secret is required" >&2; exit 3; }
            test -n "$RUNWAY_BASE_URL" || { echo "RUNWAY_BASE_URL environment variable is required" >&2; exit 2; }
            test -n "$RUNWAY_MODEL_GEN45" || { echo "RUNWAY_MODEL_GEN45 environment variable is required" >&2; exit 2; }
            test "$RUNWAY_BASE_URL" = "https://api.dev.runwayml.com" || { echo "RUNWAY_BASE_URL must use the official Runway API origin" >&2; exit 2; }
            test "$RUNWAY_MODEL_GEN45" = "gen4.5" || { echo "RUNWAY_MODEL_GEN45 must be gen4.5" >&2; exit 2; }
          fi
          if [ "$RUNWAY_SCOPE" = "all_shots" ]; then
            test "$RENDER_PROVIDER" = "runway" || { echo "all_shots requires provider=runway" >&2; exit 2; }
          fi
          if [ "$NARRATION_PROVIDER" = "openai" ]; then
            test -n "$OPENAI_TTS_API_KEY" || { echo "OPENAI_TTS_API_KEY environment secret is required" >&2; exit 3; }
          fi
      - name: Record environment approval and execute
        env:
          BUILD_ID: ${{ inputs.build_id }}
          BUILD_PROFILE: ${{ inputs.profile }}
          RENDER_PROVIDER: ${{ inputs.provider }}
          RUNWAY_SCOPE: ${{ inputs.runway_scope }}
          APPROVER: ${{ github.actor }}
          RUNWAY_API_KEY: ${{ secrets.RUNWAY_API_KEY }}
          RUNWAY_BASE_URL: ${{ vars.RUNWAY_BASE_URL }}
          RUNWAY_MODEL_GEN45: ${{ vars.RUNWAY_MODEL_GEN45 }}
          NARRATION_PROVIDER: ${{ inputs.narration_provider }}
          OPENAI_TTS_API_KEY: ${{ secrets.OPENAI_TTS_API_KEY }}
          ALLOW_AGENT_EXCEPTION: ${{ inputs.allow_agent_exception }}
          AGENT_EXCEPTION_REASON: ${{ inputs.agent_exception_reason }}
          PRE_RENDER_PREVIEW_MODE: ${{ inputs.pre_render_preview_mode }}
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          CONFIG_ARGUMENTS=()
          test -z "$CONFIG_PATH" || CONFIG_ARGUMENTS=(--config "$CONFIG_PATH")
          if [ "$ALLOW_AGENT_EXCEPTION" = "true" ]; then
            PYTHONPATH=src python3 -m insynergy_cinematic "${CONFIG_ARGUMENTS[@]}" --profile "$BUILD_PROFILE" --provider "$RENDER_PROVIDER" --runway-scope "$RUNWAY_SCOPE" --narration-provider "$NARRATION_PROVIDER" --pre-render-preview-mode "$PRE_RENDER_PREVIEW_MODE" approve "$BUILD_ID" --gate execution --actor "$APPROVER" --allow-agent-exception --agent-exception-reason "$AGENT_EXCEPTION_REASON"
          else
            PYTHONPATH=src python3 -m insynergy_cinematic "${CONFIG_ARGUMENTS[@]}" --profile "$BUILD_PROFILE" --provider "$RENDER_PROVIDER" --runway-scope "$RUNWAY_SCOPE" --narration-provider "$NARRATION_PROVIDER" --pre-render-preview-mode "$PRE_RENDER_PREVIEW_MODE" approve "$BUILD_ID" --gate execution --actor "$APPROVER"
          fi
          PYTHONPATH=src python3 -m insynergy_cinematic "${CONFIG_ARGUMENTS[@]}" --profile "$BUILD_PROFILE" --provider "$RENDER_PROVIDER" --runway-scope "$RUNWAY_SCOPE" --narration-provider "$NARRATION_PROVIDER" --pre-render-preview-mode "$PRE_RENDER_PREVIEW_MODE" execute "$BUILD_ID" > execution-result.json
          python3 -c 'import json; value=json.load(open("execution-result.json")); assert value["state"] == "READY"'
      - name: Verify runtime and quality evidence
        env:
          BUILD_ID: ${{ inputs.build_id }}
          BUILD_PROFILE: ${{ inputs.profile }}
          CONFIG_PATH: ${{ inputs.config_path }}
        run: |
          set -euo pipefail
          CONFIG_ARGUMENTS=()
          test -z "$CONFIG_PATH" || CONFIG_ARGUMENTS=(--config "$CONFIG_PATH")
          PYTHONPATH=src python3 -m insynergy_cinematic "${CONFIG_ARGUMENTS[@]}" --profile "$BUILD_PROFILE" verify "$BUILD_ID" > verification-result.json
          python3 -c 'import json; value=json.load(open("verification-result.json")); assert value["passed"] is True; assert value["quality_integrity"] is True'
      - name: Seal validated execution handoff
        uses: ./.github/actions/workflow-evidence
        with:
          operation: create
          stage: execution
          build-id: ${{ inputs.build_id }}
          profile: ${{ inputs.profile }}
          source-workflow: ${{ github.workflow }}
          source-repository: ${{ github.repository }}
          source-run-id: ${{ github.run_id }}
          source-run-attempt: ${{ github.run_attempt }}
          source-sha: ${{ github.sha }}
          paths: |
            .insynergy
            execution-result.json
            verification-result.json
            runtime-compatibility-result.json
            build-id.txt
      - name: Write safe execution summary
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/workflow_evidence.py summary --evidence workflow-evidence.json --result execution-result.json
      - name: Upload safe execution diagnostics
        if: failure()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: execution-diagnostics-${{ github.run_id }}
          path: |
            execution-result.json
            verification-result.json
            runtime-compatibility-result.json
            planning-source-result.json
            planning-recovery-inspection.json
            planning-recovery-result.json
            workflow-evidence-result.json
            .insynergy/builds/${{ inputs.build_id }}/manifest.json
            .insynergy/builds/${{ inputs.build_id }}/artifacts/render_manifest.json
            .insynergy/builds/${{ inputs.build_id }}/artifacts/render_results.json
            .insynergy/providers/runway/jobs.json
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7
      - name: Upload validated build
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: validated-${{ github.run_id }}
          path: |
            .insynergy
            execution-result.json
            verification-result.json
            runtime-compatibility-result.json
            build-id.txt
            workflow-evidence.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
