name: Storyboard Preview

on:
  workflow_dispatch:
    inputs:
      planning_run_id:
        description: Run ID of the Plan Article workflow
        required: true
        type: string
      build_id:
        description: Build ID shown by the planning workflow
        required: true
        type: string
      provider_run_id:
        description: Optional failed Storyboard Preview run to recover without OpenAI calls
        required: false
        default: ""
        type: string
      profile:
        description: Must match the planning profile
        required: true
        default: preview
        type: choice
        options: [draft, preview, final]
      provider:
        description: Must match the planned final rendering provider
        required: true
        default: local
        type: choice
        options: [local, runway]
      runway_scope:
        description: Must match the planned Runway coverage
        required: true
        default: hybrid
        type: choice
        options: [hybrid, all_shots]
      narration_provider:
        description: Must match the planned narration provider
        required: true
        default: offline
        type: choice
        options: [none, offline, openai]
      agent_review_mode:
        description: Must match the planning Agent Review mode
        required: true
        default: "off"
        type: choice
        options: ["off", review]

permissions:
  actions: read
  contents: read

concurrency:
  group: storyboard-preview-${{ inputs.build_id }}
  cancel-in-progress: false

jobs:
  preflight:
    if: inputs.provider_run_id == ''
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Validate workflow inputs
        env:
          SOURCE_RUN_ID: ${{ inputs.planning_run_id }}
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -euo pipefail
          case "$SOURCE_RUN_ID" in *[!0-9]*|'') echo "planning_run_id must be numeric" >&2; exit 2 ;; esac
          case "$BUILD_ID" in [0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]-[0-9][0-9][0-9]) ;; *) echo "invalid build_id" >&2; exit 2 ;; esac
      - name: Download sealed planning bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: planning-${{ inputs.planning_run_id }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.planning_run_id }}
      - name: Verify planning identity
        env:
          EXPECTED_BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -euo pipefail
          test "$(tr -d '\n' < build-id.txt)" = "$EXPECTED_BUILD_ID"
      - name: Verify immutable planning handoff
        uses: ./.github/actions/workflow-evidence
        with:
          operation: verify
          stage: planning
          build-id: ${{ inputs.build_id }}
          profile: ${{ inputs.profile }}
          source-workflow: Plan Article
          source-repository: ${{ github.repository }}
          source-run-id: ${{ inputs.planning_run_id }}
          source-sha: ${{ github.sha }}
      - name: Validate budget before protected provider job
        env:
          BUILD_ID: ${{ inputs.build_id }}
          BUILD_PROFILE: ${{ inputs.profile }}
          RENDER_PROVIDER: ${{ inputs.provider }}
          RUNWAY_SCOPE: ${{ inputs.runway_scope }}
          NARRATION_PROVIDER: ${{ inputs.narration_provider }}
          AGENT_REVIEW_MODE: ${{ inputs.agent_review_mode }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 -m insynergy_cinematic --profile "$BUILD_PROFILE" --provider "$RENDER_PROVIDER" --runway-scope "$RUNWAY_SCOPE" --narration-provider "$NARRATION_PROVIDER" --agent-review-mode "$AGENT_REVIEW_MODE" --pre-render-preview-mode storyboard_animatic preview-preflight "$BUILD_ID" > preview-preflight-result.json
          python3 -c 'import json; value=json.load(open("preview-preflight-result.json")); assert value["passed"] is True; assert value["openai_provider_initialized"] is False; assert value["runway_api_calls"] == 0'
      - name: Upload provider-free preflight evidence
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: storyboard-preview-preflight-${{ github.run_id }}
          path: preview-preflight-result.json
          if-no-files-found: error
          retention-days: 30

  preview:
    needs: preflight
    if: inputs.provider_run_id == ''
    environment: planning-ai
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Validate workflow inputs
        env:
          SOURCE_RUN_ID: ${{ inputs.planning_run_id }}
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -euo pipefail
          case "$SOURCE_RUN_ID" in *[!0-9]*|'') echo "planning_run_id must be numeric" >&2; exit 2 ;; esac
          case "$BUILD_ID" in [0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]-[0-9][0-9][0-9]) ;; *) echo "invalid build_id" >&2; exit 2 ;; esac
      - name: Download sealed planning bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: planning-${{ inputs.planning_run_id }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.planning_run_id }}
      - name: Verify planning identity
        env:
          EXPECTED_BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -euo pipefail
          test "$(tr -d '\n' < build-id.txt)" = "$EXPECTED_BUILD_ID"
      - name: Verify immutable planning handoff
        uses: ./.github/actions/workflow-evidence
        with:
          operation: verify
          stage: planning
          build-id: ${{ inputs.build_id }}
          profile: ${{ inputs.profile }}
          source-workflow: Plan Article
          source-repository: ${{ github.repository }}
          source-run-id: ${{ inputs.planning_run_id }}
          source-sha: ${{ github.sha }}
      - name: Download provider-free preflight evidence
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: storyboard-preview-preflight-${{ github.run_id }}
          path: .
      - name: Verify provider-free preflight result
        env:
          EXPECTED_BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 -c 'import json,os; from insynergy_cinematic.util import content_hash; value=json.load(open("preview-preflight-result.json")); observed=value.pop("content_hash"); assert observed == content_hash(value); assert value["build_id"] == os.environ["EXPECTED_BUILD_ID"]; assert value["passed"] is True; assert value["openai_provider_initialized"] is False; assert value["runway_api_calls"] == 0'
      - name: Install isolated preview toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ffmpeg
          python3 -m pip install -e '.[previsualization]'
      - name: Generate zero-Runway Storyboard Preview
        env:
          BUILD_ID: ${{ inputs.build_id }}
          BUILD_PROFILE: ${{ inputs.profile }}
          RENDER_PROVIDER: ${{ inputs.provider }}
          RUNWAY_SCOPE: ${{ inputs.runway_scope }}
          NARRATION_PROVIDER: ${{ inputs.narration_provider }}
          AGENT_REVIEW_MODE: ${{ inputs.agent_review_mode }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL_PREVIEW: ${{ vars.OPENAI_MODEL_PREVIEW }}
          OPENAI_PREVIEW_REASONING_EFFORT: ${{ vars.OPENAI_PREVIEW_REASONING_EFFORT }}
        run: |
          set -euo pipefail
          test -n "$OPENAI_API_KEY" || { echo "OPENAI_API_KEY is required" >&2; exit 3; }
          PYTHONPATH=src python3 -m insynergy_cinematic --profile "$BUILD_PROFILE" --provider "$RENDER_PROVIDER" --runway-scope "$RUNWAY_SCOPE" --narration-provider "$NARRATION_PROVIDER" --agent-review-mode "$AGENT_REVIEW_MODE" --pre-render-preview-mode storyboard_animatic previsualize "$BUILD_ID" > preview-result.json
          python3 -c 'import json; value=json.load(open("preview-result.json")); assert value["state"] == "AWAITING_STORYBOARD_PREVIEW_APPROVAL"; assert value["previsualization"]["runway_api_calls"] == 0'
      - name: Write safe preview summary
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os

          result = json.load(open("preview-result.json", encoding="utf-8"))
          preview = result["previsualization"]
          lines = [
              "## Zero-Runway Storyboard Preview",
              "",
              f"- Build: `{result['build_id']}`",
              f"- Status: `{preview['status']}`",
              f"- Plan key: `{preview['plan_key']}`",
              f"- Preview manifest hash: `{preview['preview_manifest_content_hash']}`",
              f"- Quality report hash: `{preview['quality_report_content_hash']}`",
              f"- Planning model: `{preview['model_resolved']}`",
              f"- Runway API calls: `{preview['runway_api_calls']}`",
              "",
              "The animatic is a still-frame planning artifact, not proof of motion fidelity.",
          ]
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as output:
              output.write("\n".join(lines) + "\n")
          PY
      - name: Upload provider-stage preview bundle
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: storyboard-preview-provider-${{ github.run_id }}
          path: |
            .insynergy
            preview-preflight-result.json
            preview-result.json
            build-id.txt
            workflow-evidence.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30

  compose:
    needs: [preflight, preview]
    if: >-
      always() &&
      ((inputs.provider_run_id == '' && needs.preview.result == 'success') ||
      (inputs.provider_run_id != '' && needs.preflight.result == 'skipped' && needs.preview.result == 'skipped'))
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Validate composition source inputs
        env:
          PLANNING_RUN_ID: ${{ inputs.planning_run_id }}
          PROVIDER_RUN_ID: ${{ inputs.provider_run_id }}
          BUILD_ID: ${{ inputs.build_id }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          case "$PLANNING_RUN_ID" in *[!0-9]*|'') echo "planning_run_id must be numeric" >&2; exit 2 ;; esac
          case "$PROVIDER_RUN_ID" in *[!0-9]*) echo "provider_run_id must be numeric" >&2; exit 2 ;; esac
          case "$BUILD_ID" in [0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]-[0-9][0-9][0-9]) ;; *) echo "invalid build_id" >&2; exit 2 ;; esac
          if test -n "$PROVIDER_RUN_ID"; then
            test "$PROVIDER_RUN_ID" != "$CURRENT_RUN_ID" || { echo "provider_run_id cannot be the recovery run" >&2; exit 2; }
          fi
      - name: Download provider-stage preview bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: storyboard-preview-provider-${{ inputs.provider_run_id || github.run_id }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.provider_run_id || github.run_id }}
      - name: Validate failed-run recovery binding
        if: inputs.provider_run_id != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          PROVIDER_RUN_ID: ${{ inputs.provider_run_id }}
          PLANNING_RUN_ID: ${{ inputs.planning_run_id }}
          BUILD_ID: ${{ inputs.build_id }}
          BUILD_PROFILE: ${{ inputs.profile }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/github_preview_recovery.py --repository "$REPOSITORY" --provider-run-id "$PROVIDER_RUN_ID" --planning-run-id "$PLANNING_RUN_ID" --build-id "$BUILD_ID" --profile "$BUILD_PROFILE" --root . --output ".insynergy/builds/${BUILD_ID}/recovery/storyboard-preview-source.json"
      - name: Install secretless composition toolchain
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends ffmpeg
      - name: Recompose and verify without provider credentials
        env:
          BUILD_ID: ${{ inputs.build_id }}
          BUILD_PROFILE: ${{ inputs.profile }}
          RENDER_PROVIDER: ${{ inputs.provider }}
          RUNWAY_SCOPE: ${{ inputs.runway_scope }}
          NARRATION_PROVIDER: ${{ inputs.narration_provider }}
          AGENT_REVIEW_MODE: ${{ inputs.agent_review_mode }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 -m insynergy_cinematic --profile "$BUILD_PROFILE" --provider "$RENDER_PROVIDER" --runway-scope "$RUNWAY_SCOPE" --narration-provider "$NARRATION_PROVIDER" --agent-review-mode "$AGENT_REVIEW_MODE" --pre-render-preview-mode storyboard_animatic recompose-preview "$BUILD_ID" > preview-composition-result.json || {
            result_code=$?
            if test -s preview-composition-result.json; then
              python3 -m json.tool preview-composition-result.json >&2 || true
            fi
            exit "$result_code"
          }
          python3 -c 'import json; value=json.load(open("preview-composition-result.json")); assert value["state"] == "AWAITING_STORYBOARD_PREVIEW_APPROVAL"; assert value["previsualization"]["runway_api_calls"] == 0; verification=value["recomposition_verification"]; assert verification["passed"] is True; assert verification["runway_api_calls"] == 0; assert verification["score"] >= verification["minimum"]'
      - name: Upload qualified preview bundle
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: storyboard-preview-qualified-${{ github.run_id }}
          path: |
            .insynergy
            preview-preflight-result.json
            preview-result.json
            preview-composition-result.json
            build-id.txt
            workflow-evidence.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30

  approval:
    needs: compose
    if: always() && needs.compose.result == 'success'
    environment: storyboard-preview-approval
    permissions:
      actions: read
      contents: read
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Download qualified preview bundle
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: storyboard-preview-qualified-${{ github.run_id }}
          path: .
      - name: Verify build identity
        env:
          EXPECTED_BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -euo pipefail
          test "$(tr -d '\n' < build-id.txt)" = "$EXPECTED_BUILD_ID"
      - name: Resolve actual Storyboard Preview reviewer
        id: preview_review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_INITIATOR: ${{ github.actor }}
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          set -euo pipefail
          PYTHONPATH=src python3 tools/github_environment_review.py --repository "$REPOSITORY" --run-id "$RUN_ID" --run-attempt "$RUN_ATTEMPT" --environment storyboard-preview-approval --workflow-initiator "$WORKFLOW_INITIATOR" --output ".insynergy/builds/${BUILD_ID}/approvals/storyboard-preview-github-environment-review.json" --github-output "$GITHUB_OUTPUT"
      - name: Bind actual reviewer to exact preview bundle
        env:
          BUILD_ID: ${{ inputs.build_id }}
          BUILD_PROFILE: ${{ inputs.profile }}
          RENDER_PROVIDER: ${{ inputs.provider }}
          RUNWAY_SCOPE: ${{ inputs.runway_scope }}
          NARRATION_PROVIDER: ${{ inputs.narration_provider }}
          AGENT_REVIEW_MODE: ${{ inputs.agent_review_mode }}
          WORKFLOW_INITIATOR: ${{ github.actor }}
          ENVIRONMENT_REVIEWER: ${{ steps.preview_review.outputs.environment_reviewer }}
          ENVIRONMENT_REVIEWER_ID: ${{ steps.preview_review.outputs.environment_reviewer_id }}
          ENVIRONMENT_REVIEW_HASH: ${{ steps.preview_review.outputs.environment_review_hash }}
          ENVIRONMENT_POLICY_HASH: ${{ steps.preview_review.outputs.environment_policy_hash }}
          PREVENT_SELF_REVIEW: ${{ steps.preview_review.outputs.prevent_self_review }}
        run: |
          set -euo pipefail
          SELF_REVIEW_ARGUMENTS=()
          case "$PREVENT_SELF_REVIEW" in
            true) SELF_REVIEW_ARGUMENTS=(--prevent-self-review) ;;
            false) ;;
            *) echo "invalid prevent_self_review policy" >&2; exit 7 ;;
          esac
          PYTHONPATH=src python3 -m insynergy_cinematic --profile "$BUILD_PROFILE" --provider "$RENDER_PROVIDER" --runway-scope "$RUNWAY_SCOPE" --narration-provider "$NARRATION_PROVIDER" --agent-review-mode "$AGENT_REVIEW_MODE" --pre-render-preview-mode storyboard_animatic approve "$BUILD_ID" --gate storyboard-preview --actor "$ENVIRONMENT_REVIEWER" --workflow-initiator "$WORKFLOW_INITIATOR" --environment-reviewer "$ENVIRONMENT_REVIEWER" --environment-reviewer-id "$ENVIRONMENT_REVIEWER_ID" "${SELF_REVIEW_ARGUMENTS[@]}" --environment-review-hash "$ENVIRONMENT_REVIEW_HASH" --environment-policy-hash "$ENVIRONMENT_POLICY_HASH" --comment "GitHub Environment storyboard-preview-approval" > preview-approval-result.json
          python3 -c 'import json; value=json.load(open("preview-approval-result.json")); assert value["state"] == "AWAITING_EXECUTION_APPROVAL"; assert "storyboard_preview_approval_binding" in value["artifacts"]'
      - name: Seal approved preview as planning handoff
        uses: ./.github/actions/workflow-evidence
        with:
          operation: create
          stage: planning
          build-id: ${{ inputs.build_id }}
          profile: ${{ inputs.profile }}
          source-workflow: ${{ github.workflow }}
          source-repository: ${{ github.repository }}
          source-run-id: ${{ github.run_id }}
          source-run-attempt: ${{ github.run_attempt }}
          source-sha: ${{ github.sha }}
          paths: |
            .insynergy
            preview-preflight-result.json
            preview-result.json
            preview-composition-result.json
            preview-approval-result.json
            build-id.txt
      - name: Upload approved immutable planning bundle
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: planning-${{ github.run_id }}
          path: |
            .insynergy
            preview-preflight-result.json
            preview-result.json
            preview-composition-result.json
            preview-approval-result.json
            build-id.txt
            workflow-evidence.json
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30
