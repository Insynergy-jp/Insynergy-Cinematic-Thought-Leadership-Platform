name: Publish Approved Build

on:
  workflow_dispatch:
    inputs:
      execution_run_id:
        description: Run ID of the Execute Approved Plan workflow
        required: true
        type: string
      build_id:
        description: Build ID to publish
        required: true
        type: string
      profile:
        description: Must match the execution profile
        required: true
        default: preview
        type: choice
        options: [draft, preview, final]

permissions:
  actions: read
  contents: read

concurrency:
  group: publish-${{ inputs.build_id }}
  cancel-in-progress: false

jobs:
  publish:
    environment: publication-approval
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Validate workflow inputs
        env:
          SOURCE_RUN_ID: ${{ inputs.execution_run_id }}
          BUILD_ID: ${{ inputs.build_id }}
        run: |
          case "$SOURCE_RUN_ID" in *[!0-9]*|'') echo "execution_run_id must be numeric" >&2; exit 2 ;; esac
          case "$BUILD_ID" in [0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]-[0-9][0-9][0-9]) ;; *) echo "invalid build_id" >&2; exit 2 ;; esac
      - name: Download validated build
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: validated-${{ inputs.execution_run_id }}
          path: .
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.execution_run_id }}
      - name: Record publication approval and package
        env:
          BUILD_ID: ${{ inputs.build_id }}
          BUILD_PROFILE: ${{ inputs.profile }}
          APPROVER: ${{ github.actor }}
        run: |
          PYTHONPATH=src python3 -m insynergy_cinematic --profile "$BUILD_PROFILE" approve "$BUILD_ID" --gate publish --actor "$APPROVER"
          PYTHONPATH=src python3 -m insynergy_cinematic --profile "$BUILD_PROFILE" publish "$BUILD_ID" > publication-result.json
          python3 -c 'import json; value=json.load(open("publication-result.json")); assert value["state"] == "PUBLISHED"'
      - name: Prepare browser-visible publication files
        env:
          BUILD_ID: ${{ inputs.build_id }}
          BUILD_PROFILE: ${{ inputs.profile }}
        run: |
          PACKAGE_PATH=".insynergy/builds/${BUILD_ID}/package/${BUILD_ID}.zip"
          MASTER_PATH=".insynergy/builds/${BUILD_ID}/output/master.mp4"
          MANIFEST_PATH=".insynergy/builds/${BUILD_ID}/manifest.json"
          test -s "$PACKAGE_PATH"
          test -s "$MASTER_PATH"
          test -s "$MANIFEST_PATH"
          mkdir -p publication-delivery
          install -m 0644 "$PACKAGE_PATH" "publication-delivery/${BUILD_ID}.zip"
          install -m 0644 "$MASTER_PATH" publication-delivery/master.mp4
          install -m 0644 "$MANIFEST_PATH" publication-delivery/manifest.json
          install -m 0644 publication-result.json publication-delivery/publication-result.json
          if [ "$BUILD_PROFILE" = "final" ]; then
            CAPTIONS_PATH=".insynergy/builds/${BUILD_ID}/output/captions.en.srt"
            DESCRIPTION_PATH=".insynergy/builds/${BUILD_ID}/output/youtube-description.txt"
            test -s "$CAPTIONS_PATH"
            test -s "$DESCRIPTION_PATH"
            install -m 0644 "$CAPTIONS_PATH" publication-delivery/captions.en.srt
            install -m 0644 "$DESCRIPTION_PATH" publication-delivery/youtube-description.txt
          fi
      - name: Upload publication package and evidence
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: publication-${{ github.run_id }}
          path: |
            publication-delivery/${{ inputs.build_id }}.zip
            publication-delivery/master.mp4
            publication-delivery/manifest.json
            publication-delivery/publication-result.json
            publication-delivery/captions.en.srt
            publication-delivery/youtube-description.txt
          if-no-files-found: error
          retention-days: 90
